<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Commercial & Public Solar Calculator</title>
<style>
body {
    font-family: Arial, sans-serif;
   background-image: url("register_bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
}
.container {
    width: 650px;
    margin: 40px auto;
    background: #f7f2f2b4;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
    color: #0d1453;
}
label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}
button {
    width: 100%;
    padding: 10px;
    background: #3944df;
    color: white;
    border: none;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #3b667a;
}
.result {
    margin-top: 20px;
    background: #e8f5e9;
    padding: 12px;
    border-radius: 5px;
}
.suggestion {
    margin-top: 15px;
    background: #e8f5e9;
    padding: 14px;
    border-left: 5px solid #183244;
    border-radius: 5px;
}
small {
    color: #555;
}
</style>
</head>
<body>

<div class="container">
<h2>🏢 Commercial & Public Solar Calculator</h2>

<!-- Mandatory Inputs -->
<label>Monthly Electricity Usage (kWh) *</label>
<input type="number" id="units" placeholder="e.g. 20000">

<label>OR Monthly Electricity Bill (₹) *</label>
<input type="number" id="bill" placeholder="e.g. 120000">
<small>Tariff assumed: ₹6 per unit</small>

<label>Solar Panel Wattage (W) *</label>
<input type="number" id="panel" placeholder="e.g. 500">

<hr>

<!-- Optional Inputs -->
<label>Available Area (sq.m)</label>
<input type="number" id="area" placeholder="e.g. 800">

<label>Peak Sun Hours</label>
<input type="number" id="sun" value="5">

<label>System Efficiency</label>
<select id="efficiency">
    <option value="0.85">High Efficiency (85%)</option>
    <option value="0.80" selected>Standard (80%)</option>
    <option value="0.75">Low Efficiency (75%)</option>
</select>

<hr>

<!-- Advanced Optional Inputs -->
<label>Load Profile</label>
<select id="loadProfile">
    <option value="continuous">Continuous Load (24/7)</option>
    <option value="peak">Peak Load (daytime)</option>
    <option value="mixed" selected>Mixed</option>
</select>

<label>System Type</label>
<select id="systemType">
    <option value="grid">Grid-tied</option>
    <option value="hybrid" selected>Hybrid (Grid + Battery)</option>
    <option value="offgrid">Off-grid</option>
</select>

<label>Shading Level</label>
<select id="shading">
    <option value="none" selected>No shading</option>
    <option value="partial">Partial shading</option>
    <option value="high">High shading</option>
</select>

<label>Facility Scale</label>
<select id="scale">
    <option value="small">Small</option>
    <option value="medium" selected>Medium</option>
    <option value="large">Large</option>
</select>

<label>Space Constraint</label>
<select id="space">
    <option value="ample" selected>Ample space</option>
    <option value="limited">Limited space</option>
</select>

<label>Preferred Panel Type (Optional)</label>
<select id="panelPref">
    <option value="auto" selected>Auto select best type</option>
    <option value="mono">Mono PERC</option>
    <option value="topcon">TOPCon</option>
    <option value="bifacial">Bifacial</option>
</select>

<button onclick="calculateSolar()">Calculate</button>

<div class="result" id="output"></div>
<div class="suggestion" id="suggestionBox" style="display:none;"></div>

<!-- Back to Home button -->
<button onclick="window.location.href='index.html';" style="margin-top:20px;">⬅ Back to Home</button>

</div>

<script>
function calculateSolar() {
    // Inputs
    let units = parseFloat(document.getElementById("units").value);
    let bill = parseFloat(document.getElementById("bill").value);
    let panelWatt = parseFloat(document.getElementById("panel").value);
    let areaAvailable = parseFloat(document.getElementById("area").value);
    let sunHours = parseFloat(document.getElementById("sun").value);
    let efficiency = parseFloat(document.getElementById("efficiency").value);

    // Advanced optional inputs
    let loadProfile = document.getElementById("loadProfile").value;
    let systemType = document.getElementById("systemType").value;
    let shading = document.getElementById("shading").value;
    let scale = document.getElementById("scale").value;
    let space = document.getElementById("space").value;
    let panelPref = document.getElementById("panelPref").value;

    // Mandatory check
    if ((!units && !bill) || isNaN(panelWatt) || panelWatt <= 0) {
        alert("Please enter electricity info AND panel wattage (mandatory)!");
        return;
    }

    // Monthly units calculation
    let monthlyUnits = !isNaN(units) && units > 0 ? units : bill / 6;

    // Energy & solar system calculation
    let dailyEnergy = monthlyUnits / 30; // kWh/day
    let adjustedEnergy = dailyEnergy / efficiency;
    let solarKW = adjustedEnergy / sunHours;

    // Number of panels required
    let panelsRequired = Math.ceil((solarKW * 1000) / panelWatt);

    // Panel type selection logic
    let panelType, panelDescription;

    if(panelPref !== "auto") {
        panelType = panelPref.charAt(0).toUpperCase() + panelPref.slice(1);
        panelDescription = "Preferred panel selected by user.";
    } else {
        // Automatic selection based on scale, shading, space
        if (scale === "small") panelType = "Mono PERC";
        else if (scale === "medium") panelType = "TOPCon";
        else panelType = "Bifacial";

        if (shading === "partial" || shading === "high") panelType = "Bifacial";
        if (space === "limited") panelType = "High-efficiency TOPCon";

        panelDescription = "Recommended based on your building's size, shading, and space.";
    }

    // Adjust description based on load & system type
    if (loadProfile === "peak" && systemType === "hybrid") {
        panelDescription += " ⚡ Battery storage is recommended to handle peak loads.";
    }

    // Estimated area needed
    let panelAreaPerKW = 90; // sq.m per 1 kW typical commercial
    let totalAreaSqm = solarKW * panelAreaPerKW;
    let totalAreaAcres = totalAreaSqm / 4047;
    let totalAreaHectares = totalAreaSqm / 10000;

    // Output
    document.getElementById("output").innerHTML = `
        <b>Results:</b><br>
        ⚡ Monthly Energy Usage: <b>${monthlyUnits.toFixed(0)} kWh</b><br>
        ☀️ Required Solar System Size: <b>${solarKW.toFixed(2)} kW</b><br>
        🔋 Panel Wattage Provided: <b>${panelWatt} W</b><br>
        🏢 Available Area: ${isNaN(areaAvailable) ? "Not provided" : areaAvailable + " sq.m"}<br>
    `;

    // Suggestion Box
    document.getElementById("suggestionBox").style.display = "block";
    document.getElementById("suggestionBox").innerHTML = `
        <b>💡 Panel Recommendation:</b><br>
        ✔ Suggested Panel Type: <b>${panelType}</b><br>
        ✔ Description: ${panelDescription}<br>
        ✔ Number of Panels Required: <b>${panelsRequired}</b><br>
        ✔ Estimated Area Needed for Panels: <br>
        &nbsp;&nbsp;• ${totalAreaSqm.toFixed(1)} sq.m<br>
        &nbsp;&nbsp;• ${totalAreaAcres.toFixed(2)} acres<br>
        &nbsp;&nbsp;• ${totalAreaHectares.toFixed(2)} hectares
    `;

    // Warning if area insufficient
    if (!isNaN(areaAvailable) && areaAvailable < totalAreaSqm) {
        document.getElementById("suggestionBox").innerHTML += `<br><b style="color:red;">⚠️ Warning: Available area may be insufficient for this system!</b>`;
    }
}
</script>

</body>
</html>
