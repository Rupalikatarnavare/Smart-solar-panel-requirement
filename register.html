<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url("register_bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            width: 400px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* ===== WEBSITE NAME ===== */
        .site-name {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .skip-link {
            text-align: center;
            margin-top: 15px;
        }

        .skip-link a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .skip-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="register-container">

    <!-- Website Name -->
    <div class="site-name">Welcome to Smart Solar Requirement Analyzer</div>

    <h2>Register</h2>

    <form action="index.html" method="get">
        <label>Full Name</label>
        <input type="text" name="fullname" required placeholder="Enter your full Username">

        <label>Email ID</label>
        <input type="email" name="email" required placeholder="Enter the valid email">

        <label>Phone Number</label>
        <input type="number" name="phone" required
        placeholder="Enter 10-digit phone number"
        maxlength="10"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
       required>

        <label>Address</label>
        <textarea name="address" rows="3" required></textarea>

        <button type="submit">Register</button>
    </form>

    <div class="skip-link">
        <p>or</p>
        <a href="index.html">Continue without registration</a>
    </div>
</div>

</body>
</html>
